general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = /home/alex/.config/aether/theme/backgrounds/wallhaven-l86p22.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 320, 52
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(118, 138, 184, 0.3)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    placeholder_text = <i>Parolă...</i>
    hide_input = false
    ignore_empty_input = true
    check_color = rgba(118, 138, 184, 0.8)
    fail_color = rgba(227, 81, 73, 0.8)
    fail_text = <i>Parolă greșită</i>
    capslock_color = rgba(255, 200, 0, 0.8)
    rounding = 12
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.55)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 40
    halign = center
    valign = center
}
